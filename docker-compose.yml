services:
  pulse_service:
    build: .
    container_name: pulse_service
    restart: on-failure
    ports:
      - "8083:8080"
    # For Reddit, you need to create an app at reddit.com/prefs/apps (type: script, redirect URI: http://localhost). Then fill in REDDIT_CLIENT_ID and REDDIT_CLIENT_SECRET in docker-compose and restart. That's separate from Alpaca — it's a free Reddit developer account.
    environment:
      - DB_URL=postgresql://postgres:admin@forge_timescaledb:5432/forge_dev
      - HF_HUB_DISABLE_XET=1
      # Cap CPU threads — FinBERT is bursty; don't grab all cores.
      - TORCH_NUM_THREADS=4
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - ALPACA_API_KEY=AKA5EYKBQQRN8BASRSS5
      - ALPACA_API_SECRET=WQUCOecUGmv7ESsWwnuDcBJQXMtq2HgzU6ZMQgnN
      - REDDIT_CLIENT_ID=
      - REDDIT_CLIENT_SECRET=
      - REDDIT_USER_AGENT=trade-sense-pulse/1.0
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    networks:
      - forge_network

networks:
  forge_network:
    external: true
    name: forge_network
